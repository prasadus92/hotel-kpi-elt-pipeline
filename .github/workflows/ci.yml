name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Shared DuckDB file used by the EL step, dbt, and sqlfluff's dbt templater.
      HOTEL_KPI_DUCKDB_PATH: ${{ github.workspace }}/dbt/hotel_kpi/hotel_kpi.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint Python (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Synthetic data is deterministic (regenerate, expect no diff)
        run: |
          python scripts/generate_synthetic.py
          git diff --exit-code -- data/pms_nordic_stays.csv data/pms_cloud_reservations.json

      - name: Run the pipeline (EL of all PMS sources + dbt build incl. tests + export)
        run: python run_pipeline.py

      - name: Lint SQL (sqlfluff, dbt templater)
        run: sqlfluff lint dbt/hotel_kpi/models dbt/hotel_kpi/tests

      - name: Python tests (pytest)
        run: python -m pytest

      - name: Reconcile the native source (hotel 1035) against an independent impl
        run: |
          python scripts/cross_check.py \
            --csv output/kpi_1035_2026_05_01_to_2026_05_31.csv \
            --source native --hotel-id 1035 --from-date 2026-05-01 --to-date 2026-05-31

      - name: Build + reconcile the Nordic source (property 2050)
        run: |
          python run_pipeline.py --hotel-id 2050 --from-date 2026-05-01 --to-date 2026-05-31
          python scripts/cross_check.py \
            --csv output/kpi_2050_2026_05_01_to_2026_05_31.csv \
            --source nordic --hotel-id 2050 --from-date 2026-05-01 --to-date 2026-05-31

      - name: Build + reconcile the cloud source (properties 3120 and 3121)
        run: |
          for hotel in 3120 3121; do
            python run_pipeline.py --hotel-id "$hotel" --from-date 2026-05-01 --to-date 2026-05-31
            python scripts/cross_check.py \
              --csv "output/kpi_${hotel}_2026_05_01_to_2026_05_31.csv" \
              --source cloud --hotel-id "$hotel" --from-date 2026-05-01 --to-date 2026-05-31
          done

      - name: Regression check (committed CSV matches a fresh build)
        run: git diff --exit-code -- output/kpi_1035_2026_05_01_to_2026_05_31.csv
