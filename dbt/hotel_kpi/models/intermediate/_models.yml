version: 2

models:
  - name: int_reservations_deduped
    description: >
      One row per reservation: the latest valid snapshot (greatest updated_at)
      per (hotel_id, reservation_id). The deduplication step that is most
      commonly gotten wrong. Unioned across every PMS source.
    columns:
      - name: reservation_id
        data_tests:
          - not_null
      - name: hotel_id
        data_tests:
          - not_null
      - name: source_system
        description: Which PMS the reservation came from.
        data_tests:
          - not_null
          - accepted_values:
              values: [native, nordic, cloud]
      - name: status
        description: Current status from the latest snapshot.
        data_tests:
          - not_null
          - accepted_values:
              values: [confirmed, cancelled, checked_in, checked_out]
      - name: counts_for_occupancy
        description: True for every status except cancelled.
        data_tests:
          - not_null

  - name: int_reservation_nights
    description: >
      One row per (hotel_id, reservation_id, night) after line-item validation,
      night explosion, and the inventory filter.
    columns:
      - name: night
        data_tests:
          - not_null
      - name: hotel_id
        data_tests:
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              values: [confirmed, cancelled, checked_in, checked_out]
      - name: room_type_id
        description: Always present in the hotel inventory (enforced by the filter).
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_hotel_inventory')
              field: room_type_id

  - name: int_hotel_capacity
    description: Total sellable rooms per hotel (the occupancy denominator).
    columns:
      - name: hotel_id
        data_tests:
          - not_null
          - unique
      - name: total_rooms
        data_tests:
          - not_null

  - name: int_source_event_watermarks
    description: >
      The newest event time per (source_system, hotel_id), with hotel_id =
      '__all__' as the source rollup. The event side of freshness.
    columns:
      - name: source_system
        data_tests:
          - not_null
          - accepted_values:
              values: [native, nordic, cloud]
      - name: hotel_id
        data_tests:
          - not_null
      - name: max_event_at
        data_tests:
          - not_null

  - name: int_source_kpi_control
    description: >
      Independent per-source recomputation of occupied room-nights and net
      revenue from the deduped reservations, used as the control side of
      reconciliation. One row per source_system.
    columns:
      - name: source_system
        data_tests:
          - not_null
          - unique
          - accepted_values:
              values: [native, nordic, cloud]
      - name: occupied_room_nights
        data_tests:
          - not_null
      - name: total_net_revenue
        data_tests:
          - not_null
