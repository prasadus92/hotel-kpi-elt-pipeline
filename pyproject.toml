[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".venv", "dbt/hotel_kpi/target"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "B904",  # allow plain raise within except in small CLI helpers
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
